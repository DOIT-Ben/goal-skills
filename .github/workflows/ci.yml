name: CI

on:
  push:
  pull_request:

jobs:
  skill-discovery:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate JSON metadata
        run: node -e "for (const f of ['skill.json', '.codex-plugin/plugin.json', '.claude-plugin/plugin.json', '.claude-plugin/marketplace.json', 'evals/evals.json']) JSON.parse(require('fs').readFileSync(f, 'utf8'))"

      - name: Verify skill discovery
        run: npx --yes skills add . --list --full-depth
