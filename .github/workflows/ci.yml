name: CI

on:
  push:
  pull_request:

jobs:
  skill-discovery:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate JSON metadata
        run: node -e "const fs=require('fs'); for (const f of ['skill.json','.codex-plugin/plugin.json','.claude-plugin/plugin.json','.claude-plugin/marketplace.json','evals/evals.json']) JSON.parse(fs.readFileSync(f,'utf8')); const evals=JSON.parse(fs.readFileSync('evals/evals.json','utf8')).evals; for (const e of evals) { for (const k of ['expected_mode','must_include','must_not_include','allowed_include_any']) if (!(k in e)) throw new Error(e.name + ' missing ' + k); }"

      - name: Verify skill discovery
        run: npx --yes skills add . --list --full-depth
