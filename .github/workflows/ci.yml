name: CI

on:
  push:
  pull_request:

jobs:
  skill-discovery:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Verify skill discovery
        run: npx --yes skills add . --list --full-depth
